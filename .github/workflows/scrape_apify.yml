name: Scrape Apify (Google Jobs)

on:
  schedule:
    # Once daily around 8 AM ET, Monday through Saturday
    - cron: '0 12 * * 1-6'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Scrape Apify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python -c "
          from src.scraper_apify import ApifyScraper
          from src.h1b_filter import h1b_filter
          from src.db import Database
          from src.config import Config
          import os
          
          print('Starting Apify scrape...')
          
          apify_token = os.getenv('APIFY_TOKEN')
          if not apify_token:
              print('Warning: APIFY_TOKEN not set, skipping')
              exit(0)
          
          scraper = ApifyScraper(apify_token)
          db = Database()
          
          # Build queries
          queries = scraper.build_queries(Config.JOB_TITLES, Config.LOCATIONS)
          print(f'Running {len(queries)} queries...')
          
          # Scrape
          jobs = scraper.run_scraper(queries, max_results_per_query=100)
          
          # Normalize
          normalized_jobs = [scraper.normalize_job(job) for job in jobs]
          print(f'Scraped {len(normalized_jobs)} jobs')
          
          # Filter and store
          new_count = 0
          filtered_count = 0
          
          for job in normalized_jobs:
              if not h1b_filter:
                  continue
              
              # H1B filter
              h1b_result = h1b_filter.classify_job(
                  company=job['company'],
                  description=job['description']
              )
              
              if h1b_result['h1b_flag'] == 'blocked':
                  filtered_count += 1
                  continue
              
              job['h1b_flag'] = h1b_result['h1b_flag']
              job['on_target_list'] = h1b_result['on_target_list']
              
              # Store to DB
              job_id = db.generate_job_id(job['url'], job['company'], job['title'])
              existing = db.get_job(job_id)
              
              if not existing:
                  db.insert_job(job)
                  new_count += 1
          
          print(f'New jobs: {new_count}')
          print(f'Filtered (H1B blocked): {filtered_count}')
          print(f'Duplicates: {len(normalized_jobs) - new_count - filtered_count}')
          "
      
      - name: Report status
        if: always()
        run: |
          echo "Apify scrape completed at $(date)"
