name: Scrape Greenhouse Boards

on:
  schedule:
    # ~8 AM US Eastern (12:00 UTC during EDT). Once per day, Friday and Saturday only.
    - cron: '0 12 * * 5,6'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Scrape Greenhouse boards
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          from src.scraper_greenhouse import GreenhouseScraper
          from src.h1b_filter import h1b_filter
          from src.db import Database
          from src.config import Config
          
          print('Starting Greenhouse scrape...')
          
          scraper = GreenhouseScraper()
          db = Database()
          
          # Scrape all 40 boards
          jobs = scraper.scrape_all_boards(Config.GREENHOUSE_BOARDS)
          print(f'Scraped {len(jobs)} jobs')
          
          # Filter and store
          new_count = 0
          filtered_count = 0
          
          for job in jobs:
              # H1B filter
              h1b_result = h1b_filter.classify_job(
                  company=job['company'],
                  description=job['description']
              )
              
              if h1b_result['h1b_flag'] == 'blocked':
                  filtered_count += 1
                  continue
              
              job['h1b_flag'] = h1b_result['h1b_flag']
              job['on_target_list'] = h1b_result['on_target_list']
              
              # Store to DB
              job_id = db.generate_job_id(job['url'], job['company'], job['title'])
              existing = db.get_job(job_id)
              
              if not existing:
                  db.insert_job(job)
                  new_count += 1
          
          print(f'New jobs: {new_count}')
          print(f'Filtered (H1B blocked): {filtered_count}')
          print(f'Duplicates: {len(jobs) - new_count - filtered_count}')
          "
      
      - name: Report status
        if: always()
        run: |
          echo "Greenhouse scrape completed at $(date)"
